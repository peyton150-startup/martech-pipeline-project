name: CI

on:
  push:
  workflow_dispatch:

# Superseded runs on the same branch are cancelled — no queue pile-up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Types, lint, build, e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Schema → type drift gate
        run: |
          npm run codegen
          git diff --exit-code lib/tracking/types.ts \
            || (echo "::error::lib/tracking/types.ts is out of date — run 'npm run codegen' and commit the result" && exit 1)

      - name: Type-check (app + tests)
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # CI runs the suite against the production server (next start), so the
      # timing assertions (decided_before_paint, delivery-on-navigation) are
      # validated under real build output, not the dev compiler.
      - name: E2E (Playwright against production build)
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  lighthouse:
    name: Lighthouse (CLS budget)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      # Budget lives in lighthouserc.json — CLS ≤ 0.02 is enforced as an
      # error: quantified proof, on every commit, that personalization causes
      # zero layout shift.
      - name: Lighthouse CI
        run: npx lhci autorun
